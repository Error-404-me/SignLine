# .github/workflows/build_apk.yml
name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      # ── Download models ──────────────────────────────────────────
      - name: Download Whisper models
        run: |
          gh release download whisper-models \
            --pattern "*.zip" \
            --dir speak_sign_app/assets/models/

          unzip -o speak_sign_app/assets/models/base.zip \
            -d speak_sign_app/assets/models/
          unzip -o speak_sign_app/assets/models/tiny.zip \
            -d speak_sign_app/assets/models/

          rm speak_sign_app/assets/models/*.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Vosk model
        run: |
          gh release download vosk-model \
            --pattern "vosk.zip" \
            --dir speak_sign_app/assets/models/

          unzip -o speak_sign_app/assets/models/vosk.zip \
            -d speak_sign_app/assets/models/

          rm speak_sign_app/assets/models/vosk.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify models
        run: |
          echo "=== Model files ==="
          find speak_sign_app/assets/models/ -type f | sort
          echo "=== Sizes ==="
          du -sh speak_sign_app/assets/models/*/

      # ── Build APK ────────────────────────────────────────────────
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd speak_sign_app
          flet build apk \
            --project "SignLine" \
            --org "com.kylearaneta.signline" \
            --build-number ${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signline-apk-${{ github.run_number }}
          path: speak_sign_app/build/apk/
          retention-days: 30
